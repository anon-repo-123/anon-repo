# API Configuration
openrouter:
  api_key: "${OPENROUTER_API_KEY}"  # Set environment variable
  base_url: "https://openrouter.ai/api/v1"
  site_url: ""  # Optional
  site_name: "Multi-Agent Hallucination Detection"

# Model configurations
models:
  qwen:
    name: "qwen/qwen3.6-plus"
    supports_reasoning: true
  llama:
    name: "meta-llama/llama-3.1-8b-instruct"
    supports_reasoning: false
  mistral:
    name: "mistralai/mistral-nemo"
    supports_reasoning: false
  gemma:
    name: "google/gemma-4-26b-a4b-it"
    supports_reasoning: true

# Agent thresholds
gatekeeper:
  confidence_threshold: 0.75
  low_confidence_threshold: 0.5

verifier:
  faithfulness_threshold: 0.70

editor:
  max_sentences_low_confidence: 3
  confidence_threshold_for_compression: 0.9
  max_removal_percentage: 0.5

# Pipeline settings
pipeline:
  temperature: 0.3
  max_tokens: 512
  test_samples: 2000
  rag_chunk_size: 500
  rag_top_k: 3

# Dataset paths
data:
  original: "data/output.json"
  hallucinated: "data/output_hallu.jsonl"
  results: "results/scores.json"

# Human-in-the-loop settings
hitl:
  dashboard_port: 8501
  review_queue_file: "results/hitl_queue.json"
  reviewed_file: "results/hitl_reviewed.json"
